# ═══════════════════════════════════════════════════════════════════════════════
# OIS.conf — ytcui
# Dependency package names are the *development* packages (headers + pkg-config),
# because OIS builds ytcui from source. Presence is checked with pkg-config where
# a module exists, so a runtime CLI (openssl, curl) won't be mistaken for the
# headers a build needs.
# ═══════════════════════════════════════════════════════════════════════════════

app_name        = ytcui
display_name    = ytcui — YouTube Terminal UI
binary          = ytcui
install_path    = /usr/local/bin

version_url     = https://raw.githubusercontent.com/MilkmanAbi/ytcui/main/VERSION
github          = MilkmanAbi/ytcui
update_mode     = ask
require_sudo    = auto
additional_info = A terminal YouTube client. Search and play YouTube without a browser.

desktop_category = AudioVideo
desktop_comment  = Browse and play YouTube from your terminal

[build]
system     = make
binary_out = ytcui

# ── Build toolchain ───────────────────────────────────────────────────────────
[deps]
gcc.apt    = g++
gcc.pacman = gcc
gcc.dnf    = gcc-c++
gcc.yum    = gcc-c++
gcc.zypper = gcc-c++
gcc.apk    = g++
gcc.emerge = sys-devel/gcc
gcc.xbps   = gcc
gcc.brew   = gcc
gcc.pkg    = gcc
gcc.cmd    = c++

make.apt    = make
make.pacman = make
make.dnf    = make
make.yum    = make
make.zypper = make
make.apk    = make
make.emerge = sys-devel/make
make.xbps   = make
make.brew   = make
make.pkg    = gmake
make.pkgin  = gmake
make.pkg_add = gmake
make.cmd    = make

pkgconfig.apt    = pkg-config
pkgconfig.pacman = pkgconf
pkgconfig.dnf    = pkgconf-pkg-config
pkgconfig.yum    = pkgconfig
pkgconfig.zypper = pkg-config
pkgconfig.apk    = pkgconf
pkgconfig.emerge = dev-util/pkgconf
pkgconfig.xbps   = pkg-config
pkgconfig.brew   = pkg-config
pkgconfig.pkg    = pkgconf
pkgconfig.cmd    = pkg-config

# ── Build libraries (dev headers; checked via pkg-config) ─────────────────────
ncurses.apt    = libncursesw5-dev
ncurses.pacman = ncurses
ncurses.dnf    = ncurses-devel
ncurses.yum    = ncurses-devel
ncurses.zypper = ncurses-devel
ncurses.apk    = ncurses-dev
ncurses.emerge = sys-libs/ncurses
ncurses.xbps   = ncurses-devel
ncurses.brew   = ncurses
ncurses.pkg    = ncurses
ncurses.pkgconfig = ncursesw

curl.apt    = libcurl4-openssl-dev
curl.pacman = curl
curl.dnf    = libcurl-devel
curl.yum    = libcurl-devel
curl.zypper = libcurl-devel
curl.apk    = curl-dev
curl.emerge = net-misc/curl
curl.xbps   = libcurl-devel
curl.brew   = curl
curl.pkg    = curl
curl.pkgconfig = libcurl

openssl.apt    = libssl-dev
openssl.pacman = openssl
openssl.dnf    = openssl-devel
openssl.yum    = openssl-devel
openssl.zypper = libopenssl-devel
openssl.apk    = openssl-dev
openssl.emerge = dev-libs/openssl
openssl.xbps   = openssl-devel
openssl.brew   = openssl@3
openssl.pkg    = openssl
openssl.pkgconfig = openssl

# ── Runtime ───────────────────────────────────────────────────────────────────
mpv.apt    = mpv
mpv.pacman = mpv
mpv.dnf    = mpv
mpv.yum    = mpv
mpv.zypper = mpv
mpv.apk    = mpv
mpv.emerge = media-video/mpv
mpv.xbps   = mpv
mpv.brew   = mpv
mpv.pkg    = mpv
mpv.cmd    = mpv

git.apt    = git
git.pacman = git
git.dnf    = git
git.brew   = git
git.pkg    = git
git.cmd    = git

# ── Optional ──────────────────────────────────────────────────────────────────
[deps.optional]
chafa.apt    = chafa
chafa.pacman = chafa
chafa.dnf    = chafa
chafa.zypper = chafa
chafa.apk    = chafa
chafa.emerge = media-gfx/chafa
chafa.xbps   = chafa
chafa.brew   = chafa
chafa.pkg    = chafa
chafa.cmd    = chafa
chafa.desc   = terminal thumbnails (block art + sixel/kitty)

libsixel.apt    = libsixel-dev
libsixel.pacman = libsixel
libsixel.dnf    = libsixel-devel
libsixel.zypper = libsixel-devel
libsixel.apk    = libsixel-dev
libsixel.xbps   = libsixel-devel
libsixel.brew   = libsixel
libsixel.pkg    = libsixel
libsixel.pkgconfig = libsixel
libsixel.desc   = in-process sixel encoding (build with SIXEL=libsixel)
